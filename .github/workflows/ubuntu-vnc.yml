name: Ubuntu VNC Server (带数据持久化)

on:
  workflow_dispatch:
    inputs:
      total_hours:
        description: '总运行时长（小时）'
        required: true
        default: '12'
        type: choice
        options: ['6', '12', '18', '24']

jobs:
  ubuntu-vnc:
    strategy:
      matrix:
        run: ${{ fromJson(github.event.inputs.total_hours == '6' && '[1]' || github.event.inputs.total_hours == '12' && '[1,2]' || github.event.inputs.total_hours == '18' && '[1,2,3]' || '[1,2,3,4]') }}
      fail-fast: false
      max-parallel: 1

    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      # ==================== 核心修复：预计算批次号 ====================
      - name: 计算批次信息
        id: batch-info
        run: |
          # 计算上一批次号
          PREV_BATCH=$(( ${{ matrix.run }} - 1 ))
          echo "prev_batch=$PREV_BATCH" >> "$GITHUB_OUTPUT"
          
          # 计算总批次
          TOTAL_BATCHES=${{ strategy.job-total }}
          echo "total_batches=$TOTAL_BATCHES" >> "$GITHUB_OUTPUT"
          
          # 显示信息
          echo "当前批次: ${{ matrix.run }}"
          echo "上一批次: $PREV_BATCH"
          echo "总批次: $TOTAL_BATCHES"
          echo "需要恢复数据: $([ ${{ matrix.run }} -gt 1 ] && echo '是' || echo '否')"

      # ==================== 数据恢复步骤 ====================
      - name: 下载之前保存的数据
        uses: actions/download-artifact@v4
        if: matrix.run > 1
        continue-on-error: true
        with:
          name: vnc-data-batch-${{ steps.batch-info.outputs.prev_batch }}  # 使用计算结果
          path: /tmp/vnc-data-restore

      - name: 恢复VNC配置和用户数据
        if: matrix.run > 1
        continue-on-error: true
        run: |
          if [ -f "/tmp/vnc-data-restore/vnc-backup.tar.gz" ]; then
            echo "发现之前保存的数据，正在恢复..."
            tar -xzf /tmp/vnc-data-restore/vnc-backup.tar.gz -C $HOME/
            
            if [ -f "$HOME/.vnc/plain-password.txt" ]; then
              PASS=$(cat "$HOME/.vnc/plain-password.txt")
              echo "VNC_PASSWORD=$PASS" >> "$GITHUB_ENV"
              echo "✓ 已恢复VNC密码"
            fi
            
            if [ -d "$HOME/persistent-data" ]; then
              echo "✓ 已恢复用户数据，共 $(find $HOME/persistent-data -type f 2>/dev/null | wc -l) 个文件"
            fi
          else
            echo "未找到可恢复的数据"
          fi

      # ==================== 系统初始化 ====================
      - name: 系统初始化（第一批）
        if: matrix.run == 1
        run: |
          echo "=== 首次运行，执行完整初始化 ==="
          sudo apt-get update && sudo apt-get upgrade -y
          echo -e '#!/bin/sh\nexit 101' | sudo tee /usr/sbin/policy-rc.d >/dev/null
          sudo chmod +x /usr/sbin/policy-rc.d
          mkdir -p $HOME/persistent-data
          echo "提示: 重要数据请保存在 ~/persistent-data/ 目录"

      - name: 安装桌面和VNC（第一批）
        if: matrix.run == 1
        run: |
          bash .github/workflows/scripts/disable-systemctl.sh
          bash .github/workflows/scripts/precreate-users.sh
          bash .github/workflows/scripts/install-desktop-vnc.sh
          bash .github/workflows/scripts/validate-tmpfiles.sh
          bash .github/workflows/scripts/reenable-services.sh

      - name: 配置VNC服务器（第一批）
        if: matrix.run == 1
        run: |
          mkdir -p ~/.vnc
          PASS=$(tr -dc 'A-Za-z0-9!@#$%^&*' </dev/urandom | head -c 16)
          echo "$PASS" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          echo "$PASS" > ~/.vnc/plain-password.txt
          chmod 600 ~/.vnc/plain-password.txt
          echo "VNC_PASSWORD=$PASS" >> "$GITHUB_ENV"
          
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          [ -r "$HOME/.Xresources" ] && xrdb "$HOME/.Xresources"
          export XDG_SESSION_TYPE=x11
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          exec dbus-launch /usr/bin/gnome-session --session=gnome
          EOF
          chmod +x ~/.vnc/xstartup

      - name: 启动VNC服务器
        run: |
          vncserver -kill :0 || true
          sleep 2
          vncserver :0 -localhost no -geometry 1280x800 -depth 24 -xstartup ~/.vnc/xstartup

      - name: 配置Tailscale
        id: tailscale
        run: |
          if ! command -v tailscale &> /dev/null; then
            curl -fsSL https://tailscale.com/install.sh | sh
          fi
          sudo systemctl stop tailscaled 2>/dev/null || true
          sudo pkill -9 tailscaled || true
          sleep 2
          
          sudo mkdir -p /var/run /var/lib/tailscale
          nohup sudo tailscaled --state=/var/lib/tailscale/tailscaled.state \
            --socket=/var/run/tailscale/tailscaled.sock \
            >/tmp/tailscaled.log 2>&1 &
          sleep 5
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-runner-${GITHUB_RUN_ID}-run${{ matrix.run }} \
            --accept-routes
          sleep 3
          
          echo "TAILSCALE_IP=$(tailscale ip -4)" >> "$GITHUB_ENV"

      - name: 验证VNC连接
        run: |
          nc -z -v "$TAILSCALE_IP" 5900
          echo "✓ VNC连接正常"

      # ==================== 数据保存步骤 ====================
      - name: 打包持久化数据
        id: backup
        run: |
          mkdir -p $HOME/persistent-data
          tar -czf /tmp/vnc-backup.tar.gz \
            -C $HOME/ \
            .vnc/plain-password.txt \
            .vnc/passwd \
            .vnc/xstartup \
            persistent-data/
          echo "✓ 数据打包完成"

      - name: 上传数据供下一批次使用
        uses: actions/upload-artifact@v4
        if: matrix.run < strategy.job-total
        with:
          name: vnc-data-batch-${{ matrix.run }}  # 直接使用matrix.run
          path: /tmp/vnc-backup.tar.gz
          retention-days: 1
          compression-level: 0

      # ==================== 运行会话 ====================
      - name: 显示访问信息
        run: |
          echo "::notice::═══════════════════════════════════════"
          echo "::notice::  VNC服务器已就绪！"
          echo "::notice::  批次: ${{ matrix.run }} / ${{ strategy.job-total }}"
          echo "::notice::  IP: ${TAILSCALE_IP}:5900"
          echo "::notice::  密码: ${VNC_PASSWORD}"
          echo "::notice::═══════════════════════════════════════"

      - name: 保持连接活跃
        run: |
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + 360 * 60 - 300))
          
          echo "========================================"
          echo "  VNC 持久化会话"
          echo "========================================"
          echo "批次: ${{ matrix.run }} / ${{ strategy.job-total }}"
          echo "地址: ${TAILSCALE_IP}:5900"
          echo "密码: ${VNC_PASSWORD}"
          echo "时长: 6小时 (预留5分钟保存数据)"
          echo "数据: ~/persistent-data/"
          echo "========================================"
          
          while true; do
            CURRENT_TIME=$(date +%s)
            REMAINING=$(( (END_TIME - CURRENT_TIME) / 60 ))
            
            if [ $REMAINING -le 0 ]; then
              echo "[$(date)] 时间到，准备保存数据..."
              break
            fi
            
            echo "[$(date)] 运行中，剩余 ${REMAINING} 分钟"
            sleep 300
          done

      - name: 清理资源
        if: always()
        run: |
          vncserver -kill :0 || true
          sudo pkill -9 tailscaled || true
