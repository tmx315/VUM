name: Ubuntu VNC Server with Relay (Test)

on:
  workflow_dispatch:

jobs:
  ubuntu-vnc-primary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Update APT
        run: sudo apt-get update

      - name: Prevent service auto-start during apt
        run: |
          echo -e '#!/bin/sh\nexit 101' | sudo tee /usr/sbin/policy-rc.d >/dev/null
          sudo chmod +x /usr/sbin/policy-rc.d

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disable systemctl hooks
        run: bash .github/workflows/scripts/disable-systemctl.sh

      - name: Pre-create system users and directories
        run: bash .github/workflows/scripts/precreate-users.sh

      - name: Install Desktop and VNC Server
        run: bash .github/workflows/scripts/install-desktop-vnc.sh

      - name: Validate system users and tmpfiles
        run: bash .github/workflows/scripts/validate-tmpfiles.sh

      - name: Re-enable service start
        run: bash .github/workflows/scripts/reenable-services.sh

      - name: Configure VNC Server
        run: |
          mkdir -p ~/.vnc
          # Generate VNC password
          PASS=$(tr -dc 'A-Za-z0-9!@#$%^&*' </dev/urandom | head -c 16)
          echo "$PASS" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          # Store password in environment variable
          echo "VNC_PASSWORD=$PASS" >> "$GITHUB_ENV"
          # Also store in a file for backup
          echo "$PASS" > ~/.vnc/password.txt
          chmod 600 ~/.vnc/password.txt
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          [ -r "$HOME/.Xresources" ] && xrdb "$HOME/.Xresources"
          export XDG_SESSION_TYPE=x11
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          exec dbus-launch /usr/bin/gnome-session --session=gnome
          EOF
          chmod +x ~/.vnc/xstartup
          # Retry VNC server start
          for i in {1..3}; do
            echo "Attempt $i to start VNC server..."
            # Kill any existing VNC server on :0
            vncserver -kill :0 2>/dev/null || true
            sleep 2
            # Start VNC server
            output=$(vncserver :0 -localhost no -geometry 1280x800 -depth 24 -xstartup ~/.vnc/xstartup 2>&1)
            echo "$output"
            # Check if VNC server started successfully
            if echo "$output" | grep -E 'New Xtigervnc server|Xvnc server'; then
              echo "VNC server started successfully"
              break
            elif echo "$output" | grep -E 'already running'; then
              echo "VNC server is already running"
              break
            fi
            echo "VNC server start failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start tailscaled (manual)
        run: |
          sudo mkdir -p /var/run
          # Kill any existing tailscaled processes
          sudo pkill -f tailscaled || true
          sleep 2
          nohup sudo tailscaled >/tmp/tailscaled.log 2>&1 & disown
          # Wait for tailscaled to start
          for i in {1..5}; do
            if sudo tailscaled --socket=/var/run/tailscale/tailscaled.sock status >/dev/null 2>&1; then
              echo "tailscaled started successfully"
              break
            fi
            echo "Waiting for tailscaled to start..."
            sleep 2
          done
          sleep 3

      - name: Connect to Tailscale
        run: |
          # Retry Tailscale connection
          for i in {1..3}; do
            echo "Attempt $i to connect to Tailscale..."
            sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID}
            if tailscale status | grep -E 'Active|Connected'; then
              echo "Tailscale connected successfully"
              break
            fi
            echo "Tailscale connection failed, retrying in 5 seconds..."
            sleep 5
          done
          # Get Tailscale IP
          for i in {1..5}; do
            IP=$(tailscale ip -4)
            if [ -n "$IP" ]; then
              echo "TAILSCALE_IP=$IP" >> "$GITHUB_ENV"
              echo "Tailscale IP obtained: $IP"
              break
            fi
            echo "Waiting for Tailscale IP..."
            sleep 2
          done

      - name: Restore systemctl hooks
        run: bash .github/workflows/scripts/restore-systemctl.sh

      - name: Verify VNC Connection
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"
          nc -z -v "$TAILSCALE_IP" 5900

      - name: Keep Connection Alive and Backup at 5 Hours
        run: |
          # Set timezone to UTC to avoid confusion
          export TZ=UTC
          
          # Get VNC password from environment variable or file
          VNC_PASS="${VNC_PASSWORD}"
          if [ -z "$VNC_PASS" ] && [ -f "~/.vnc/password.txt" ]; then
            VNC_PASS=$(cat "~/.vnc/password.txt")
          fi
          
          echo "=== VNC ACCESS INFORMATION ==="
          echo "Address: ${TAILSCALE_IP}:5900"
          echo "Password: ${VNC_PASS}"
          echo "Desktop: GNOME"
          echo "==============================="
          
          start_time=$(date +%s)
          backup_time=$((start_time + 5 * 60))  # 5 minutes
          end_time=$((start_time + 10 * 60))  # 10 minutes
          last_minute_backup=$((start_time / 60 / 1))  # 1 minute intervals
          
          echo "[$(date)] Workflow started at $(date -d @$start_time)"
          echo "[$(date)] 5-minute backup scheduled at $(date -d @$backup_time)"
          echo "[$(date)] Workflow will end at $(date -d @$end_time)"
          echo "[$(date)] 1-minute backups will run every 1 minute"
          
          # Create backup directory early to avoid issues later
          backup_dir="/tmp/vnc-backup-${GITHUB_RUN_ID}"
          mkdir -p "$backup_dir"
          
          # Create directory for 1-minute backups
          minute_backup_dir="/tmp/vnc-1min-backups-${GITHUB_RUN_ID}"
          mkdir -p "$minute_backup_dir"
          
          # Function to handle cleanup
          cleanup() {
            echo "[$(date)] Cleaning up..."
            vncserver -kill :0 || true
            sudo pkill -f tailscaled || true
          }
          
          # Function to perform 1-minute backup
          perform_1min_backup() {
            local backup_time=$(date +%Y%m%d_%H%M%S)
            local backup_file="$minute_backup_dir/backup_${backup_time}.tar.gz"
            local home_dir="$HOME"
            echo "[$(date)] Performing 1-minute backup..."
            echo "[$(date)] Home directory: $home_dir"
            # Create necessary directories if they don't exist
            mkdir -p "$home_dir/.vnc" "$home_dir/Documents" "$home_dir/Desktop"
            tar -czf "$backup_file" --exclude="Downloads" --exclude="tmp" --exclude="node_modules" "$home_dir/.vnc" "$home_dir/Documents" "$home_dir/Desktop" || echo "[$(date)] Warning: 1-minute backup failed"
            echo "[$(date)] 1-minute backup completed: $backup_file"
          }
          
          # Trap SIGTERM and SIGINT
          trap cleanup SIGTERM SIGINT
          
          while true; do
            current_time=$(date +%s)
            remaining=$((backup_time - current_time))
            current_minute=$((current_time / 60 % 1))
            
            # Perform 1-minute backup
            if [ $current_minute -eq 0 ] && [ $last_minute_backup -ne $((current_time / 60 / 1)) ]; then
              perform_1min_backup
              last_minute_backup=$((current_time / 60 / 1))
            fi
            
            if [ $remaining -le 0 ] && [ $current_time -lt $end_time ]; then
              echo "[$(date)] Starting 5-minute backup process..."
              
              # Backup important files and directories
              echo "Backing up home directory..."
              local home_dir="$HOME"
              echo "[$(date)] Home directory: $home_dir"
              # Create necessary directories if they don't exist
              mkdir -p "$home_dir/.vnc" "$home_dir/Documents" "$home_dir/Desktop"
              tar -czf "$backup_dir/home-backup.tar.gz" --exclude="Downloads" --exclude="tmp" --exclude="node_modules" "$home_dir" || echo "[$(date)] Warning: Home backup failed"
              
              echo "Backing up VNC configuration..."
              cp -r ~/.vnc "$backup_dir/" || echo "[$(date)] Warning: VNC config backup failed"
              
              echo "Backing up system configuration..."
              sudo cp -r /etc/vnc* "$backup_dir/" 2>/dev/null || true
              
              # Copy 1-minute backups to main backup directory
              echo "Copying 1-minute backups to main backup..."
              cp -r "$minute_backup_dir" "$backup_dir/"
              
              # Upload backup as artifact
              echo "Uploading backup artifact..."
              echo "BACKUP_DIR=$backup_dir" >> "$GITHUB_ENV"
              break
            elif [ $current_time -ge $end_time ]; then
              echo "[$(date)] Workflow time limit reached"
              exit 0
            else
              echo "[$(date)] VNC Active - 5-minute backup in $((remaining / 60)) minutes"
              # Check if VNC server is still running
              # More reliable check using ps and netstat
              if ps aux | grep -E 'Xtigervnc|Xvnc' | grep -v grep | grep -E ':0'; then
                echo "[$(date)] VNC server is running"
              elif netstat -tuln | grep -E '5900'; then
                echo "[$(date)] VNC server is running on port 5900"
              else
                echo "[$(date)] Warning: VNC server not running, restarting..."
                # Only kill if process exists
                vncserver -kill :0 2>/dev/null || true
                sleep 2
                # Start VNC server
                output=$(vncserver :0 -localhost no -geometry 1280x800 -depth 24 -xstartup ~/.vnc/xstartup 2>&1)
                if echo "$output" | grep -E 'New Xtigervnc server|Xvnc server|already running'; then
                  echo "[$(date)] VNC server restarted successfully"
                else
                  echo "[$(date)] Error: Failed to restart VNC server"
                fi
              fi
              # Check if Tailscale is still connected
              tailscale_status=$(tailscale status 2>&1)
              ip_check=$(tailscale ip -4 2>&1)
              if echo "$tailscale_status" | grep -E 'Active|Connected|State.*active' || [ -n "$ip_check" ] && ! echo "$ip_check" | grep -E 'error|not found'; then
                echo "[$(date)] Tailscale is connected"
                # Update Tailscale IP if needed
                if [ -n "$ip_check" ] && ! echo "$ip_check" | grep -E 'error|not found'; then
                  echo "TAILSCALE_IP=$ip_check" >> "$GITHUB_ENV"
                  echo "[$(date)] Tailscale IP: $ip_check"
                fi
              else
                echo "[$(date)] Warning: Tailscale not connected, restarting..."
                # Restart tailscaled service
                sudo pkill -f tailscaled || true
                sleep 2
                nohup sudo tailscaled >/tmp/tailscaled.log 2>&1 & disown
                sleep 3
                # Reconnect to Tailscale
                sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID}
                sleep 2
                # Check if connected
                tailscale_status=$(tailscale status 2>&1)
                ip_check=$(tailscale ip -4 2>&1)
                if echo "$tailscale_status" | grep -E 'Active|Connected|State.*active' || [ -n "$ip_check" ] && ! echo "$ip_check" | grep -E 'error|not found'; then
                  echo "[$(date)] Tailscale reconnected successfully"
                  # Update Tailscale IP
                  if [ -n "$ip_check" ] && ! echo "$ip_check" | grep -E 'error|not found'; then
                    echo "TAILSCALE_IP=$ip_check" >> "$GITHUB_ENV"
                    echo "[$(date)] Tailscale IP updated: $ip_check"
                  fi
                else
                  echo "[$(date)] Error: Failed to reconnect Tailscale"
                fi
              fi
              sleep 60
            fi
          done
          
          echo "[$(date)] Backup process completed successfully"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnc-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_DIR }}
          retention-days: 1

      - name: Trigger Relay Workflow
        run: |
          echo "Triggering relay workflow..."
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"event_type": "vnc-relay", "client_payload": {"backup_artifact": "vnc-backup-${{ github.run_id }}"}}'