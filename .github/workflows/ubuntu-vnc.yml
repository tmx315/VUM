name: Ubuntu VNC Server（完整修复版）

on:
  workflow_dispatch:
    inputs:
      total_hours:
        description: '总运行时长（小时）'
        required: true
        default: '12'
        type: choice
        options: ['6', '12', '18', '24']

jobs:
  ubuntu-vnc:
    strategy:
      matrix:
        run: ${{ fromJson(github.event.inputs.total_hours == '6' && '[1]' || github.event.inputs.total_hours == '12' && '[1,2]' || github.event.inputs.total_hours == '18' && '[1,2,3]' || '[1,2,3,4]') }}
      fail-fast: false
      max-parallel: 1

    runs-on: ubuntu-24.04
    timeout-minutes: 400

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 记录会话开始时间
        run: |
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> "$GITHUB_OUTPUT"
          echo "会话开始时间: $(date -d @$START_TIME)"
        id: session-start

      - name: 计算批次信息
        id: batch-info
        run: |
          PREV_BATCH=$(( ${{ matrix.run }} - 1 ))
          echo "prev_batch=$PREV_BATCH" >> "$GITHUB_OUTPUT"
          echo "total_batches=${{ strategy.job-total }}" >> "$GITHUB_OUTPUT"

      # ==================== apt锁终极清理（仅第一批） ====================
      - name: 终极apt锁清理（强制）
        if: matrix.run == 1
        run: |
          echo "=== 终极apt锁清理（强制）==="
          for i in {1..10}; do
            sudo pkill -9 -f "apt|dpkg" 2>/dev/null || true
            sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock
            sudo dpkg --configure -a 2>/dev/null || true
            [ ! -f /var/lib/dpkg/lock-frontend ] && echo "✓ apt锁清理成功" && break || echo "第$i次清理..."
            sleep 1
          done

      # ==================== 智能恢复（使用官方action） ====================
      - name: 下载前一批次数据
        if: matrix.run > 1
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vnc-data-batch-${{ steps.batch-info.outputs.prev_batch }}
          path: /tmp
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 验证并恢复数据
        if: matrix.run > 1
        continue-on-error: true
        run: |
          echo "=== 从批次 ${{ steps.batch-info.outputs.prev_batch }} 恢复数据 ==="
          
          # 检查文件是否存在且有效
          if [ -f "/tmp/vnc-backup.tar.gz" ] && file /tmp/vnc-backup.tar.gz | grep -q "gzip compressed data"; then
            echo "✓ 找到有效备份数据，正在恢复..."
            tar -xzf /tmp/vnc-backup.tar.gz -C $HOME/
            
            echo "VNC_PASSWORD=tmx12531574121" >> "$GITHUB_ENV"
            echo "✓ 已设置固定VNC密码"
          else
            echo "⚠ 未找到有效的HOME备份数据"
          fi
          
          if [ -f "/tmp/vnc-backup-www.tar.gz" ] && file /tmp/vnc-backup-www.tar.gz | grep -q "gzip compressed data"; then
            sudo tar -xzf /tmp/vnc-backup-www.tar.gz -C /
            echo "✓ 已恢复 /www 目录"
          else
            echo "⚠ 未找到有效的/www备份数据"
          fi
          
          if [ -f "/tmp/vnc-backup-mxw.tar.gz" ] && file /tmp/vnc-backup-mxw.tar.gz | grep -q "gzip compressed data"; then
            sudo tar -xzf /tmp/vnc-backup-mxw.tar.gz -C /home/
            echo "✓ 已恢复 /home/mxw 目录"
          else
            echo "⚠ 未找到有效的/home/mxw备份数据"
          fi
          
          sudo chown -R $USER:$USER /www/server/panel/data 2>/dev/null || true
          sudo chmod -R 755 /www/server/panel 2>/dev/null || true
          echo "✓ 数据恢复完成"

      # ==================== 第一批：环境初始化 ====================
      - name: 强制清理Web环境（第一批）
        if: matrix.run == 1
        run: |
          echo "🔥 强制清理Web环境..."
          sudo pkill -9 apache2 nginx mysql mysqld php-fpm 2>/dev/null || true
          sudo rm -rf /www /etc/apache2 /etc/nginx /etc/mysql /etc/php*
          sudo apt purge -y apache2* nginx* mysql* php* 2>/dev/null || true
          sudo apt autoremove --purge -y 2>/dev/null || true
          echo "✅ 清理完成"

      - name: 安装 frpc（第一批）
        if: matrix.run == 1
        run: |
          echo "=== 安装 frpc ==="
          [ ! -d "/home/mxw" ] && sudo mkdir -p /home/mxw && sudo chown $USER:$USER /home/mxw
          cd /home/mxw
          if [ ! -f "frpc" ]; then
            wget -O 001.tar.gz https://cf-v1.uapis.cn/download/ChmlFrp-0.51.2_251023_linux_386.tar.gz
            tar -zxvf 001.tar.gz && rm 001.tar.gz
            FRPC_PATH=$(find . -name "frpc" -type f | head -1)
            [ -n "$FRPC_PATH" ] && mv "$FRPC_PATH" ./frpc && chmod +x frpc && echo "✓ frpc 安装完成"
          else
            echo "✓ frpc 已存在"
          fi

      - name: 启动 frpc 服务
        run: |
          [ -f "/home/mxw/frpc" ] && cd /home/mxw && pkill -9 frpc || true && sleep 1
          nohup ./frpc -u X3KylKR1tWyDMu4t7q8gQfKc -p 242158 > frpc.log 2>&1 &
          sleep 2 && pgrep frpc > /dev/null && echo "✓ frpc 启动成功" || echo "⚠ frpc 启动失败"

      - name: 安装宝塔面板（第一批）
        if: matrix.run == 1
        run: |
          echo "=== 安装宝塔面板 ==="
          if [ ! -d "/www" ]; then
            wget -O install.sh http://download.bt.cn/install/install_6.0.sh
            echo "y" | sudo bash install.sh || echo "⚠ 安装可能遇到问题"
            sleep 15
            sudo chown -R $USER:$USER /www/server/panel/data 2>/dev/null || true
            sudo chmod -R 755 /www/server/panel 2>/dev/null || true
            [ -d "/www/server/panel" ] && echo "✓ 宝塔安装成功" || echo "⚠ 宝塔未完成安装"
          else
            echo "✓ /www 已存在"
          fi

      - name: 配置宝塔面板（第一批）
        if: matrix.run == 1
        run: |
          echo "=== 配置宝塔面板 ==="
          [ -d "/www/server/panel" ] || exit 0
          sudo chown -R $USER:$USER /www/server/panel/data 2>/dev/null || true
          sudo chmod -R 755 /www/server/panel 2>/dev/null || true
          cd /www/server/panel
          sudo python3 tools.py username mxw 2>/dev/null || true
          echo "tmx12531574121" | sudo python3 tools.py password 2>/dev/null || true
          sudo mkdir -p /www/server/panel/data
          echo "mxw315" | sudo tee /www/server/panel/data/admin_path.pl > /dev/null
          sudo chmod 600 /www/server/panel/data/admin_path.pl
          sudo /etc/init.d/bt restart 2>/dev/null || true
          sleep 3
          echo "✓ 宝塔配置完成"

      # ==================== 安装桌面和VNC（必须在配置VNC之前） ====================
      - name: 安装桌面和VNC（第一批）
        if: matrix.run == 1
        run: |
          bash .github/workflows/scripts/disable-systemctl.sh
          bash .github/workflows/scripts/precreate-users.sh
          bash .github/workflows/scripts/install-desktop-vnc.sh || echo "⚠ 桌面安装可能遇到问题"
          bash .github/workflows/scripts/validate-tmpfiles.sh
          bash .github/workflows/scripts/reenable-services.sh

      # ==================== 安装中文语言包（非关键） ====================
      - name: 安装中文语言包
        continue-on-error: true
        run: |
          echo "=== 安装中文语言包（非关键步骤）==="
          sudo apt-get update --fix-missing
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            language-pack-zh-hans language-pack-zh-hans-base fonts-noto-cjk fonts-wqy-zenhei \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" 2>&1 | tee /tmp/apt-install.log || true
          
          sudo locale-gen zh_CN.UTF-8 2>/dev/null || true
          sudo update-locale LANG=zh_CN.UTF-8 2>/dev/null || true
          
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LANGUAGE=zh_CN:zh" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "✓ 中文环境配置完成（可能部分失败）"

      # ==================== VNC配置（检查vncpasswd是否存在） ====================
      - name: 配置VNC（固定密码）
        run: |
          mkdir -p ~/.vnc
          
          # 检查vncpasswd命令是否存在
          if ! command -v vncpasswd &> /dev/null; then
            echo "⚠ vncpasswd 命令不存在，VNC可能未正确安装"
            echo "尝试重新安装tigervnc-standalone-server..."
            sudo apt-get update && sudo apt-get install -y tigervnc-standalone-server tigervnc-common
          fi
          
          # 再次检查
          if command -v vncpasswd &> /dev/null; then
            PASS="tmx12531574121"
            echo "$PASS" | vncpasswd -f > ~/.vnc/passwd
            echo "$PASS" > ~/.vnc/plain-password.txt
            chmod 600 ~/.vnc/passwd ~/.vnc/plain-password.txt
            echo "VNC_PASSWORD=$PASS" >> "$GITHUB_ENV"
            echo "✓ VNC密码配置完成"
          else
            echo "⚠ VNC安装失败，无法配置密码"
            exit 1  # 关键步骤，失败则退出
          fi
          
          # 配置启动脚本
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          [ -r "$HOME/.Xresources" ] && xrdb "$HOME/.Xresources"
          export XDG_SESSION_TYPE=x11
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export LANG=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh
          export LC_ALL=zh_CN.UTF-8
          exec dbus-launch /usr/bin/gnome-session --session=gnome
          EOF
          chmod +x ~/.vnc/xstartup

      - name: 启动VNC服务器
        run: |
          vncserver -kill :0 || true
          sleep 2
          vncserver :0 -localhost no -geometry 1280x800 -depth 24 -xstartup ~/.vnc/xstartup

      - name: 配置Tailscale
        id: tailscale
        run: |
          if ! command -v tailscale &> /dev/null; then
            curl -fsSL https://tailscale.com/install.sh  | sh
          fi
          sudo systemctl stop tailscaled 2>/dev/null || true
          sudo pkill -9 tailscaled || true
          sleep 2
          
          sudo mkdir -p /var/run /var/lib/tailscale
          nohup sudo tailscaled --state=/var/lib/tailscale/tailscaled.state \
            --socket=/var/run/tailscale/tailscaled.sock \
            >/tmp/tailscaled.log 2>&1 &
          sleep 5
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-runner-${GITHUB_RUN_ID}-run${{ matrix.run }} \
            --accept-routes
          sleep 3
          
          echo "TAILSCALE_IP=$(tailscale ip -4)" >> "$GITHUB_ENV"

      - name: 验证VNC连接
        run: |
          nc -z -v "$TAILSCALE_IP" 5900
          echo "✓ VNC连接正常"

      - name: 显示访问信息
        run: |
          echo "::notice::═══════════════════════════════════════"
          echo "::notice::  VNC服务器已就绪！"
          echo "::notice::  批次: ${{ matrix.run }} / ${{ strategy.job-total }}"
          echo "::notice::  IP: ${TAILSCALE_IP}:5900"
          echo "::notice::  密码: ${VNC_PASSWORD}"
          echo "::notice::═══════════════════════════════════════"
          echo "::notice::  宝塔面板：mxw / tmx12531574121 / ${TAILSCALE_IP}:8888/mxw315"
          echo "::notice::═══════════════════════════════════════"

      # ==================== 会话保持（计时包含所有步骤） ====================
      - name: 保持连接活跃
        run: |
          touch /tmp/session-start-marker
          START_TIME=${{ steps.session-start.outputs.start_time }}
          CURRENT_TIME=$(date +%s)
          ELAPSED=$(( (CURRENT_TIME - START_TIME) / 60 ))
          
          echo "========================================"
          echo "  VNC 持久化会话 - 全程计时"
          echo "========================================"
          echo "工作流开始时间: $(date -d @$START_TIME)"
          echo "前期步骤耗时: ${ELAPSED} 分钟"
          echo "========================================"
          
          END_TIME=$((START_TIME + 360 * 60))
          RESERVED_END_TIME=$((END_TIME - 300))
          
          while true; do
            CURRENT_TIME=$(date +%s)
            REMAINING=$(( (RESERVED_END_TIME - CURRENT_TIME) / 60 ))
            
            if [ $REMAINING -le 0 ]; then
              echo "[$(date)] 时间到，准备保存数据..."
              break
            fi
            
            echo "[$(date)] 运行中，剩余 ${REMAINING} 分钟"
            sleep 300
          done

      # ==================== 智能数据保存（带目录检测） ====================
      - name: 智能增量备份
        if: matrix.run < strategy.job-total
        run: |
          echo "=== 智能增量备份 ==="
          
          if [ -d "/www" ]; then
            sudo tar -czf /tmp/vnc-backup-www.tar.gz -C / www/
            echo "✓ /www备份: $(sudo du -sh /tmp/vnc-backup-www.tar.gz | cut -f1)"
          else
            echo "⚠ /www 不存在，跳过"
          fi
          
          if [ -d "/home/mxw" ]; then
            sudo tar -czf /tmp/vnc-backup-mxw.tar.gz -C /home mxw/
            echo "✓ /home/mxw备份: $(sudo du -sh /tmp/vnc-backup-mxw.tar.gz | cut -f1)"
          else
            echo "⚠ /home/mxw 不存在，跳过"
          fi
          
          cat > /tmp/exclude-list.txt << 'EOF'
          .cache/
          .local/share/Trash/
          .gvfs/
          .dbus/
          /tmp/
          .bash_history
          .npm/_cacache/
          .npm/_logs/
          EOF
          
          tar -czf /tmp/vnc-backup.tar.gz --exclude-from=/tmp/exclude-list.txt -C $HOME/ .
          echo "✓ HOME备份: $(du -sh /tmp/vnc-backup.tar.gz | cut -f1)"

      - name: 上传数据供下批次使用
        if: matrix.run < strategy.job-total
        uses: actions/upload-artifact@v4
        with:
          name: vnc-data-batch-${{ matrix.run }}"
          path: |
            /tmp/vnc-backup.tar.gz
            /tmp/vnc-backup-www.tar.gz
            /tmp/vnc-backup-mxw.tar.gz
          retention-days: 1
          compression-level: 0

      # ==================== 清理资源 ====================
      - name: 清理资源
        if: always()
        run: |
          echo "=== 清理会话资源 ==="
          vncserver -kill :0 || true
          pkill -9 frpc || true
          sudo pkill -9 tailscaled || true
          rm -f /tmp/session-start-marker /tmp/exclude-list.txt 2>/dev/null || true
